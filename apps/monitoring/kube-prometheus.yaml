apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: "82.18.0"
    helm:
      valuesObject:
        crds:
          enabled: false
        alertmanager:
          enabled: false
        grafana:
          adminPassword: J@y2dworld2916
          assertNoLeakedSecrets: false
          grafana.ini:
            security:
              allow_embedding: true
            auth.anonymous:
              enabled: true
              org_role: Editor
            database:
              type: postgres
              host: prod-db-rw.linkvolt.svc.cluster.local:5432
              name: grafana
              user: grafana
              ssl_mode: disable
          envValueFrom:
            GF_DATABASE_PASSWORD:
              secretKeyRef:
                name: grafana-db-password
                key: password
          deploymentStrategy:
            type: Recreate
          persistence:
            enabled: true
            size: 2Gi
            storageClassName: ceph-block
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          sidecar:
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 200m
                memory: 256Mi
            dashboards:
              enabled: true
              label: grafana_dashboard
              labelValue: "1"
              searchNamespace: ALL
            datasources:
              enabled: true
              label: grafana_datasource
              labelValue: "1"
              searchNamespace: ALL
          service:
            type: LoadBalancer
          alerting:
            contactpoints.yaml:
              apiVersion: 1
              contactPoints:
                - orgId: 1
                  name: discord-alerts
                  receivers:
                    - uid: discord-alerts
                      type: discord
                      disableResolveMessage: false
                      settings:
                        url: https://discord.com/api/webhooks/1488523135673438218/LwHduAqgfJlKe5SualXjPm8TgsQrElaVmbHVb_SzWieTPiAfBQtfNzfN-0MlfUPokpn6
                        use_discord_username: false
                        title: '{{ `{{ .CommonAnnotations.summary }}` }}'
                        message: |
                          {{ `{{ range .Alerts }}**[{{ .Status | toUpper }}]** {{ .Labels.alertname }}
                          {{ .Annotations.summary }}
                          {{ if .Annotations.description }}{{ .Annotations.description }}
                          {{ end }}{{ if .Labels.severity }}severity: {{ .Labels.severity }}
                          {{ end }}{{ if .Labels.pod }}pod: {{ .Labels.pod }}
                          {{ end }}{{ if .Labels.namespace }}ns: {{ .Labels.namespace }}
                          {{ end }}{{ end }}` }}
            policies.yaml:
              apiVersion: 1
              policies:
                - orgId: 1
                  receiver: discord-alerts
                  group_by: [grafana_folder, alertname, pod]
                  group_wait: 10s
                  group_interval: 1m
                  repeat_interval: 4h
                  routes:
                    - receiver: discord-alerts
                      object_matchers:
                        - [severity, =~, warning|critical]
                      continue: false
        prometheusOperator:
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
        kube-state-metrics:
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
        prometheus-node-exporter:
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
        prometheus:
          prometheusSpec:
            replicas: 2
            podAntiAffinity: soft
            # Unlock experimental PromQL functions (sort_by_label, etc.)
            # used by some Grafana dashboards (saas-ideas-top, gh-hype, ...).
            enableFeatures:
              - promql-experimental-functions
            resources:
              requests:
                cpu: 200m
                memory: 512Mi
              limits:
                cpu: 1000m
                memory: 2Gi
            retentionSize: 15GB
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: ceph-block
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 20Gi
            serviceMonitorSelectorNilUsesHelmValues: false
            additionalScrapeConfigsSecret:
              enabled: true
              name: additional-scrape-configs
              key: prometheus-additional.yaml
            alertingEndpoints:
              - name: kube-prometheus-grafana
                namespace: monitoring
                port: http-web
                pathPrefix: /api/alertmanager/grafana
                apiVersion: v2
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
