apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-config
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://github.com/joyson-fernandes/monitoring.git
      targetRevision: main
      path: datasources
    - repoURL: https://github.com/joyson-fernandes/monitoring.git
      targetRevision: main
      path: dashboards
    - repoURL: https://github.com/joyson-fernandes/monitoring.git
      targetRevision: main
      path: alerting
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  ignoreDifferences:
    - group: ""
      kind: PersistentVolumeClaim
      jsonPointers:
        - /status
