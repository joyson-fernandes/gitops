apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: crowdsec-lapi-secrets-vault
  namespace: crowdsec
  annotations:
    # Apply before the chart (default wave 0) so the Secret exists when
    # LAPI pod starts; otherwise first rollout hits CreateContainerConfigError.
    argocd.argoproj.io/sync-wave: "-1"
  labels:
    app: crowdsec
    team: platform
    env: production
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    # Chart reads keys `csLapiSecret` + `registrationToken` from the
    # secret named via secrets.externalSecret.name. This target name
    # must match that value.
    name: crowdsec-lapi-secrets-vault
    creationPolicy: Owner
  data:
    # conversionStrategy/decodingStrategy/metadataPolicy are ESO defaults;
    # stated explicitly so ArgoCD's selfHeal doesn't churn against the
    # controller's normalised spec (OutOfSync loop otherwise).
    - secretKey: csLapiSecret
      remoteRef:
        key: crowdsec/lapi-secrets
        property: csLapiSecret
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: registrationToken
      remoteRef:
        key: crowdsec/lapi-secrets
        property: registrationToken
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
