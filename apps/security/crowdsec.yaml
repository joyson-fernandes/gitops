apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: crowdsec
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://crowdsecurity.github.io/helm-charts
    chart: crowdsec
    targetRevision: "0.23.0"
    helm:
      valuesObject:
        # Explicit auto_registration block. The chart default at config.config.yaml.local
        # already contains this, but our running LAPI pod has no config.yaml.local on
        # disk (verified 2026-04-21 — api.server stanza contains only log_level).
        # Without it, `cscli lapi register` persists agents as "not validated" and
        # every new DS rollout has agents crash-loop on /v1/watchers/login 401 until
        # someone runs `cscli machines validate` manually. Pod CIDR 10.244.0.0/16
        # is covered by the 10.0.0.0/8 range; the 192.168 / 172.16 ranges are trimmed.
        config:
          config.yaml.local: |
            api:
              server:
                auto_registration:
                  enabled: true
                  token: "${REGISTRATION_TOKEN}"
                  allowed_ranges:
                    - "10.244.0.0/16"
                    - "10.0.0.0/8"
                    - "127.0.0.1/32"
        commonLabels:
          app: crowdsec
          team: platform
          env: production
        agent:
          podLabels:
            app: crowdsec
            team: platform
            env: production
          metrics:
            serviceMonitor:
              enabled: true
          # Using additionalAcquisition (raw block) instead of the chart's
          # shorthand `acquisition` because the shorthand hardcodes labels.type=docker,
          # which invokes crowdsecurity/docker-logs. K8s/containerd writes CRI-format
          # lines (`<ts> <stream> <F|P> <msg>`), not Docker JSON, so docker-logs leaves
          # evt.Parsed.message empty and downstream parsers (traefik-logs) never match.
          # Setting type=containerd routes lines through crowdsecurity/cri-logs instead.
          # poll_without_inotify keeps polling the symlink across pod rotations.
          additionalAcquisition:
            - source: file
              filenames:
                - /var/log/containers/traefik-*_traefik_*.log
              poll_without_inotify: true
              labels:
                type: containerd
                program: traefik
          env:
            - name: COLLECTIONS
              value: "crowdsecurity/traefik crowdsecurity/http-cve crowdsecurity/base-http-scenarios"
        lapi:
          podLabels:
            app: crowdsec
            team: platform
            env: production
          dashboard:
            enabled: false
          metrics:
            serviceMonitor:
              enabled: true
          extraVolumes:
            - name: console-credentials
              secret:
                secretName: crowdsec-online-api-credentials
          extraVolumeMounts:
            - name: console-credentials
              mountPath: /etc/crowdsec/online_api_credentials.yaml
              subPath: online_api_credentials.yaml
              readOnly: true
          persistentVolume:
            config:
              enabled: true
              storageClassName: ceph-block
              size: 1Gi
            data:
              enabled: true
              storageClassName: ceph-block
              size: 2Gi
          env:
            - name: BOUNCER_KEY_traefik
              valueFrom:
                secretKeyRef:
                  name: crowdsec-bouncer-key
                  key: key
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
        service:
          type: ClusterIP
  destination:
    server: https://kubernetes.default.svc
    namespace: crowdsec
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
