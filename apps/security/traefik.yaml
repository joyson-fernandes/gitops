apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://traefik.github.io/charts
      chart: traefik
      targetRevision: "39.0.7"
      helm:
        valuesObject:
          deployment:
            replicas: 3
          service:
            type: LoadBalancer
          api:
            dashboard: true
            insecure: true
          ingressRoute:
            dashboard:
              enabled: true
          ports:
            web:
              port: 80
            websecure:
              port: 443
          additionalArguments:
            - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
            - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
          providers:
            kubernetesIngress:
              enabled: true
            kubernetesCRD:
              enabled: true
              allowCrossNamespace: true
              allowExternalNameServices: true
          persistence:
            enabled: false
          podDisruptionBudget:
            enabled: true
            minAvailable: 2
          podSecurityContext:
            fsGroup: 65532
            fsGroupChangePolicy: OnRootMismatch
          affinity:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchExpressions:
                        - key: app.kubernetes.io/name
                          operator: In
                          values:
                            - traefik
                    topologyKey: kubernetes.io/hostname
          updateStrategy:
            type: RollingUpdate
            rollingUpdate:
              maxSurge: 1
              maxUnavailable: 0
    - repoURL: https://github.com/joyson-fernandes/storage.git
      targetRevision: main
      path: manifests/traefik
  destination:
    server: https://kubernetes.default.svc
    namespace: traefik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
