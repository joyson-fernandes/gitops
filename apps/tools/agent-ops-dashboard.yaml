apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agent-ops-dashboard
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/part-of: agents
spec:
  project: default
  source:
    repoURL: https://github.com/joyson-fernandes/agent-ops-dashboard.git
    targetRevision: main
    path: deploy
  destination:
    server: https://kubernetes.default.svc
    namespace: agents
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
      # ServerSideDiff uses kube-apiserver dry-run for diffing, which respects
      # CRD defaults — so external-secrets-defaulted fields no longer show as drift.
      - ServerSideDiff=true
  ignoreDifferences:
    # external-secrets controller adds its cleanup finalizer at runtime
    - group: external-secrets.io
      kind: ExternalSecret
      jsonPointers:
        - /metadata/finalizers
