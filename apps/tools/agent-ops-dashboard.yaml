apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agent-ops-dashboard
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/part-of: agents
spec:
  project: default
  source:
    repoURL: https://github.com/joyson-fernandes/agent-ops-dashboard.git
    targetRevision: main
    path: deploy
  destination:
    server: https://kubernetes.default.svc
    namespace: agents
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
