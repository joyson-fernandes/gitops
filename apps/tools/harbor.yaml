apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: harbor
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://helm.goharbor.io
      chart: harbor
      targetRevision: "1.18.3"
      helm:
        valueFiles:
          - $values/helm/values.yaml
    - repoURL: https://github.com/joyson-fernandes/harbor.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: harbor
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  ignoreDifferences:
    - kind: Secret
      jsonPointers:
        - /data
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/template/metadata/annotations
    # Live patch on harbor-nginx ConfigMap adds client_body_timeout 900s + send_timeout 900s
    # to the /v2/ location block (chart hardcodes nginx.conf with 60s default which kills
    # large-blob pushes mid-upload). See `kubectl get cm harbor-nginx -n harbor`.
    - kind: ConfigMap
      name: harbor-nginx
      jsonPointers:
        - /data
