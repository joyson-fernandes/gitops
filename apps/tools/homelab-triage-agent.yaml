apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homelab-triage-agent
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/part-of: agents
spec:
  project: default
  source:
    repoURL: https://github.com/joyson-fernandes/homelab-triage-agent.git
    targetRevision: main
    path: deploy
  destination:
    server: https://kubernetes.default.svc
    namespace: agents
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false   # namespace.yaml is in deploy/, manages PSS labels
      - ServerSideApply=true
  ignoreDifferences:
    # ignore everything the external-secrets controller writes back
    # (finalizer + CRD-defaulted spec fields like conversionStrategy/decodingStrategy/metadataPolicy)
    - group: external-secrets.io
      kind: ExternalSecret
      managedFieldsManagers:
        - external-secrets
