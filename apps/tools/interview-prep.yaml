apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: interview-prep
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/part-of: interview-prep
spec:
  project: default
  source:
    repoURL: https://github.com/joyson-fernandes/interview-prep.git
    targetRevision: main
    path: deploy/chart
    helm:
      releaseName: prep
  destination:
    server: https://kubernetes.default.svc
    namespace: interview-prep
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jsonPointers:
        - /spec/data
        - /spec/dataFrom
        - /spec/target
