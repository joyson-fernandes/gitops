apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: n8n
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://community-charts.github.io/helm-charts
    chart: n8n
    targetRevision: "1.0.0"
    helm:
      valuesObject:
        config:
          timezone: Europe/London
        database:
          type: postgresdb
          useExternal: true
          host: prod-db-rw.linkvolt.svc.cluster.local
          port: 5432
          database: n8n
          user: n8n
          passwordSecret:
            name: n8n-db-password
            key: password
        persistence:
          enabled: true
          size: 1Gi
          storageClassName: local-path
        resources:
          main:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
        ingress:
          enabled: false
        queueMode:
          enabled: false
        secretRefs:
          existingSecret: n8n-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: n8n
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
