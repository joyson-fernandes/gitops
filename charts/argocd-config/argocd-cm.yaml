apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd
data:
  resource.customizations.health.ceph.rook.io_CephCluster: |
    hs = {}
    if obj.status ~= nil and obj.status.ceph ~= nil then
      local health = obj.status.ceph.health
      local details = obj.status.ceph.details or {}
      local ignored = { BLUESTORE_SLOW_OP_ALERT = true }
      if health == "HEALTH_OK" then
        hs.status = "Healthy"
        hs.message = health
        return hs
      end
      if health == "HEALTH_WARN" then
        local realIssue = false
        local msgs = {}
        for k, v in pairs(details) do
          if not ignored[k] then
            realIssue = true
          end
          table.insert(msgs, k)
        end
        if not realIssue then
          hs.status = "Healthy"
          hs.message = "HEALTH_WARN (ignored: " .. table.concat(msgs, ",") .. ")"
          return hs
        end
        hs.status = "Degraded"
        hs.message = health .. " " .. table.concat(msgs, ",")
        return hs
      end
    end
    hs.status = "Progressing"
    hs.message = "Waiting for Ceph cluster"
    return hs
