apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "career-ops-dashboard.fullname" . }}
  labels: {{- include "career-ops-dashboard.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate  # writes via emptyDir mean a single replica; recreate avoids two pods racing on /data
  selector:
    matchLabels: {{- include "career-ops-dashboard.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{- include "career-ops-dashboard.labels" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "8080"
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}
      volumes:
        - name: data
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        {{- if .Values.gitSync.enabled }}
        - name: git-sync-secret
          secret:
            secretName: {{ .Values.gitSync.secretName }}
            defaultMode: 0400
        {{- end }}
      {{- if .Values.gitSync.enabled }}
      initContainers:
        - name: git-sync-init
          image: {{ .Values.gitSync.image }}
          args:
            - --repo={{ .Values.gitSync.repo }}
            - --ref={{ .Values.gitSync.branch }}
            - --root=/data
            - --link=current
            - --one-time
            - --ssh-known-hosts-file=/etc/git-secret/known-hosts
            - --max-failures=3
          env:
            - name: GITSYNC_SSH_KEY_FILE
              value: /etc/git-secret/ssh-key
            - name: HOME
              value: /tmp
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
            - name: git-sync-secret
              mountPath: /etc/git-secret
              readOnly: true
          resources:
            limits: { cpu: 200m, memory: 128Mi }
            requests: { cpu: 50m, memory: 32Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65533
            capabilities: { drop: [ALL] }
      {{- end }}
      containers:
        - name: server
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - -addr=:8080
            - -data=/data/current
            - -static=/app/web/static
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: data
              mountPath: /data
              readOnly: true
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            periodSeconds: 30
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            periodSeconds: 10
          resources: {{- toYaml .Values.resources | nindent 12 }}
          securityContext: {{- toYaml .Values.securityContext | nindent 12 }}
        {{- if .Values.gitSync.enabled }}
        - name: git-sync
          image: {{ .Values.gitSync.image }}
          args:
            - --repo={{ .Values.gitSync.repo }}
            - --ref={{ .Values.gitSync.branch }}
            - --root=/data
            - --link=current
            - --period={{ .Values.gitSync.period }}
            - --ssh-known-hosts-file=/etc/git-secret/known-hosts
            - --error-file=/data/.git-sync-errors
            - --max-failures=3
          env:
            - name: GITSYNC_SSH_KEY_FILE
              value: /etc/git-secret/ssh-key
            - name: HOME
              value: /tmp
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
            - name: git-sync-secret
              mountPath: /etc/git-secret
              readOnly: true
          resources:
            limits: { cpu: 100m, memory: 64Mi }
            requests: { cpu: 10m, memory: 16Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65533
            capabilities: { drop: [ALL] }
        {{- end }}
