{{- if .Values.externalSecrets.enabled }}
{{- if .Values.basicAuth.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.basicAuth.secretName }}
  labels: {{- include "career-ops-dashboard.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.storeRef.name }}
    kind: {{ .Values.externalSecrets.storeRef.kind }}
  target:
    name: {{ .Values.basicAuth.secretName }}
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        users: '{{`{{ .users }}`}}'
  data:
    - secretKey: users
      remoteRef:
        key: career-ops/basic-auth
        property: users
{{- end }}
---
{{- if .Values.gitSync.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.gitSync.secretName }}
  labels: {{- include "career-ops-dashboard.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.storeRef.name }}
    kind: {{ .Values.externalSecrets.storeRef.kind }}
  target:
    name: {{ .Values.gitSync.secretName }}
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        ssh-key: '{{`{{ .ssh_key }}`}}'
        known-hosts: '{{`{{ .known_hosts }}`}}'
  data:
    - secretKey: ssh_key
      remoteRef:
        key: career-ops/git-sync
        property: ssh-key
    - secretKey: known_hosts
      remoteRef:
        key: career-ops/git-sync
        property: known-hosts
{{- end }}
{{- end }}
