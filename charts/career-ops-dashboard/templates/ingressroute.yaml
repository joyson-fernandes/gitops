{{- if .Values.ingress.enabled }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "career-ops-dashboard.fullname" . }}-tls
  labels: {{- include "career-ops-dashboard.labels" . | nindent 4 }}
spec:
  secretName: {{ include "career-ops-dashboard.fullname" . }}-tls
  issuerRef:
    name: {{ .Values.ingress.certIssuer }}
    kind: ClusterIssuer
  dnsNames:
    - {{ .Values.ingress.host }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "career-ops-dashboard.fullname" . }}
  labels: {{- include "career-ops-dashboard.labels" . | nindent 4 }}
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`{{ .Values.ingress.host }}`)
      kind: Rule
      services:
        - name: {{ include "career-ops-dashboard.fullname" . }}
          port: {{ .Values.service.port }}
      middlewares:
        {{- range .Values.ingress.middlewares }}
        - name: {{ .name }}
          {{- if .namespace }}
          namespace: {{ .namespace }}
          {{- end }}
        {{- end }}
  tls:
    secretName: {{ include "career-ops-dashboard.fullname" . }}-tls
{{- end }}
