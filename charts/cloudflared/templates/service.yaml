apiVersion: v1
kind: Service
metadata:
  name: cloudflared-metrics
  namespace: {{ .Values.namespace }}
  labels:
    app: cloudflared
    tier: app
    team: platform
    env: {{ .Values.env }}
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: cloudflared
  ports:
    - name: metrics
      port: 2000
      targetPort: metrics
      protocol: TCP
