apiVersion: apps/v1
kind: Deployment
metadata:
  name: display-manager
  namespace: {{ .Values.namespace }}
  labels:
    app: display-manager
    team: platform
    env: {{ .Values.env }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: display-manager
  template:
    metadata:
      labels:
        app: display-manager
        team: platform
        env: {{ .Values.env }}
    spec:
      imagePullSecrets:
        - name: harbor-pull-secret
      containers:
        - name: display-manager
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.port }}
          env:
            - name: SSH_KEY_PATH
              value: /app/ssh/id_rsa
            - name: DB_PATH
              value: /app/data/displays.json
            - name: CA_CERT_PATH
              value: /app/certs/local-ca.crt
          volumeMounts:
            - name: ssh-key
              mountPath: /app/ssh
              readOnly: true
            - name: data
              mountPath: /app/data
            - name: ca-cert
              mountPath: /app/certs
              readOnly: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: ssh-key
          secret:
            secretName: display-manager-ssh-key
            defaultMode: 0600
        - name: data
          persistentVolumeClaim:
            claimName: display-manager-data
        - name: ca-cert
          secret:
            secretName: display-manager-ca-cert
