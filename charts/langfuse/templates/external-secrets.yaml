    name: vault
    kind: ClusterSecretStore
  target:
    name: langfuse-clickhouse
    creationPolicy: Owner
    template:
      data:
        # Bitnami ClickHouse chart looks for both keys
        admin-password: "{{ `{{ .password }}` }}"
        password: "{{ `{{ .password }}` }}"
  data:
    - secretKey: password
      remoteRef: { key: joysontech/langfuse/clickhouse, property: password }
---
apiVersion: external-secrets.io/v1
