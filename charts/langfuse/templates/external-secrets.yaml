---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: langfuse-s3
  namespace: {{ .Values.namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: langfuse-s3
    creationPolicy: Owner
    template:
      data:
        # Bitnami MinIO chart uses these key names
        root-user: "{{ `{{ .access_key_id }}` }}"
        root-password: "{{ `{{ .secret_access_key }}` }}"
        access_key_id: "{{ `{{ .access_key_id }}` }}"
        secret_access_key: "{{ `{{ .secret_access_key }}` }}"
  data:
    - secretKey: access_key_id
      remoteRef: { key: joysontech/langfuse/s3, property: access_key_id }
    - secretKey: secret_access_key
      remoteRef: { key: joysontech/langfuse/s3, property: secret_access_key }
