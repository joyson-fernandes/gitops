apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: langfuse-config
  namespace: {{ .Values.namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: langfuse-config
    creationPolicy: Owner
  data:
    - secretKey: nextauth_secret
      remoteRef: { key: joysontech/langfuse/auth, property: nextauth_secret }
    - secretKey: salt
      remoteRef: { key: joysontech/langfuse/auth, property: salt }
    - secretKey: encryption_key
      remoteRef: { key: joysontech/langfuse/auth, property: encryption_key }
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: langfuse-postgres
  namespace: {{ .Values.namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: langfuse-postgres
    creationPolicy: Owner
    template:
      data:
        # Bitnami PG chart expects both the admin (postgres) password and
        # the app user password in the same Secret.
        postgres-password: "{{ `{{ .password }}` }}"
        password: "{{ `{{ .password }}` }}"
  data:
    - secretKey: password
      remoteRef: { key: joysontech/langfuse/postgres, property: password }
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: langfuse-clickhouse
  namespace: {{ .Values.namespace }}
