apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: langfuse-joysontech-com
  namespace: {{ .Values.namespace }}
spec:
  secretName: langfuse-joysontech-com-tls
  issuerRef:
    name: {{ .Values.ingress.certIssuer }}
    kind: ClusterIssuer
  dnsNames:
    - {{ .Values.ingress.host }}
  duration: 8760h
  renewBefore: 720h
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: langfuse
  namespace: {{ .Values.namespace }}
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ .Values.ingress.host }}`)
      kind: Rule
      services:
        - name: langfuse-web
          port: 3000
  tls:
    secretName: langfuse-joysontech-com-tls
