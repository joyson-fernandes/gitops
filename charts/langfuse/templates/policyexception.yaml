apiVersion: kyverno.io/v2
kind: PolicyException
metadata:
  name: langfuse-exceptions
  # PolicyException lives in the kyverno namespace so it's evaluated even
  # while the langfuse namespace is being created on first sync. The match
  # block below scopes it to the langfuse namespace.
  namespace: kyverno
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  exceptions:
    - policyName: require-labels
      ruleNames:
        - require-app-team-env-labels
        - autogen-require-app-team-env-labels
    - policyName: restrict-registry
      ruleNames:
        - restrict-to-harbor
        - autogen-restrict-to-harbor
        - autogen-cronjob-restrict-to-harbor
  match:
    any:
      - resources:
          namespaces:
            - {{ .Values.namespace }}
