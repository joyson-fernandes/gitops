apiVersion: v1
kind: Service
metadata:
  name: llm-control
  namespace: {{ .Values.namespace }}
  labels:
    app: llm-control
    team: platform
    env: {{ .Values.env }}
spec:
  type: ClusterIP
  selector:
    app: llm-control
  ports:
    - port: {{ .Values.port }}
      targetPort: {{ .Values.port }}
      protocol: TCP
      name: http
