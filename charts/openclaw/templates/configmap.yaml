apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: {{ .Values.namespace }}
  labels:
    app: openclaw
    team: platform
    env: {{ .Values.env }}
data:
  openclaw.json: |
    {
      "gateway": {
        "bind": "lan",
        "port": {{ .Values.gateway.port }},
        "tokenEnvVar": "OPENCLAW_GATEWAY_TOKEN"
      },
      "llm": {
        "provider": "{{ .Values.llm.provider }}",
        "baseUrl": "{{ .Values.llm.baseUrl }}"
      },
      "dataDir": "/home/node/.openclaw",
      "soulFile": "/etc/openclaw/SOUL.md",
      "skills": {
        "autoInstall": false,
        "allowList": []
      }
    }
