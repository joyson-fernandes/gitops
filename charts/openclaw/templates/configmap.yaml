apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: {{ .Values.namespace }}
  labels:
    app: openclaw
    team: platform
    env: {{ .Values.env }}
data:
  openclaw.json: |
    {
      "gateway": {
        "mode": "local",
        "bind": "lan",
        "port": {{ .Values.gateway.port }},
        "auth": {
          "mode": "token"
        },
        "controlUi": {
          "enabled": true,
          "allowedOrigins": ["https://openclaw.joysontech.com"],
          "dangerouslyDisableDeviceAuth": true
        }
      },
      "agents": {
        "defaults": {
          "workspace": "~/.openclaw/workspace",
          "model": "ollama/qwen3.5:27b"
        },
        "list": [
          {
            "id": "default",
            "name": "OpenClaw Assistant",
            "workspace": "~/.openclaw/workspace",
            "model": "ollama/qwen3.5:27b"
          }
        ]
      },
      "models": {
        "providers": {
          "ollama": {
            "baseUrl": "{{ .Values.llm.baseUrl }}",
            "auth": "none",
            "api": "openai-chat",
            "models": [
              {
                "id": "qwen3.5:27b",
                "name": "Qwen 3.5 27B",
                "api": "openai-chat",
                "reasoning": false,
                "input": ["text"],
                "contextWindow": 32768,
                "maxTokens": 8192
              }
            ]
          }
        },
        "default": "ollama/qwen3.5:27b"
      },
      "cron": { "enabled": false }
    }
