apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: {{ .Values.namespace }}
  labels:
    app: openclaw
    team: platform
    env: {{ .Values.env }}
data:
  openclaw.json: |
    {
      "gateway": {
        "mode": "local",
        "bind": "lan",
        "port": {{ .Values.gateway.port }},
        "auth": {
          "mode": "token"
        },
        "trustedProxies": {{ .Values.gateway.trustedProxies | toJson }},
        "controlUi": {
          "enabled": true,
          "allowedOrigins": ["https://openclaw.joysontech.com"],
          "dangerouslyDisableDeviceAuth": true
        }
      },
      "agents": {
        "defaults": {
          "workspace": "~/.openclaw/workspace",
          "model": "ollama/{{ .Values.llm.model }}"
        },
        "list": [
          {
            "id": "default",
            "name": "OpenClaw Assistant",
            "workspace": "~/.openclaw/workspace",
            "model": "ollama/{{ .Values.llm.model }}"
          }
        ]
      },
      "models": {
        "providers": {
          "ollama": {
            "baseUrl": "{{ .Values.llm.baseUrl }}",
            "auth": "api-key",
            "api": "ollama",
            "models": [
              {
                "id": "{{ .Values.llm.model }}",
                "name": "{{ .Values.llm.modelName }}",
                "api": "ollama",
                "reasoning": false,
                "input": ["text"],
                "contextWindow": {{ .Values.llm.contextWindow }},
                "maxTokens": {{ .Values.llm.maxTokens }}
              }
            ]
          }
        }
      },
      "cron": { "enabled": false }
    }
