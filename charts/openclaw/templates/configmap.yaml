apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: {{ .Values.namespace }}
  labels:
    app: openclaw
    team: platform
    env: {{ .Values.env }}
data:
  openclaw.json: |
    {
      "gateway": {
        "mode": "local",
        "bind": "lan",
        "port": {{ .Values.gateway.port }},
        "auth": {
          "mode": "token"
        },
        "controlUi": {
          "enabled": true,
          "allowedOrigins": ["https://openclaw.joysontech.com"]
        }
      },
      "llm": {
        "provider": "{{ .Values.llm.provider }}",
        "baseUrl": "{{ .Values.llm.baseUrl }}"
      },
      "agents": {
        "defaults": {
          "workspace": "~/.openclaw/workspace"
        },
        "list": [
          {
            "id": "default",
            "name": "OpenClaw Assistant",
            "workspace": "~/.openclaw/workspace"
          }
        ]
      },
      "cron": { "enabled": false },
      "skills": {
        "autoInstall": false,
        "allowList": []
      }
    }
