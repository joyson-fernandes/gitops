apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: {{ .Values.namespace }}
  labels:
    app: openclaw
    tier: app
    team: platform
    env: {{ .Values.env }}
spec:
  replicas: {{ .Values.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
        tier: app
        team: platform
        env: {{ .Values.env }}
    spec:
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: harbor-pull-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: write-gateway-config
          image: busybox
          command: ["sh", "-c"]
          args:
            - |
              cat > /data/config.json <<'CFGEOF'
              {"gateway":{"mode":"local","bind":"lan"}}
              CFGEOF
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: socat-proxy
          image: alpine/socat
          args: ["TCP-LISTEN:18790,fork,reuseaddr,bind=0.0.0.0", "TCP:127.0.0.1:18789"]
          ports:
            - containerPort: 18790
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
        - name: openclaw
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-gateway
                  key: token
            - name: OPENCLAW_GATEWAY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: openclaw-gateway
                  key: password
            - name: OPENCLAW_CONFIG
              value: /etc/openclaw/openclaw.json
            - name: NODE_ENV
              value: production
          volumeMounts:
            - name: config
              mountPath: /etc/openclaw/openclaw.json
              subPath: openclaw.json
              readOnly: true
            - name: soul
              mountPath: /etc/openclaw/SOUL.md
              subPath: SOUL.md
              readOnly: true
            - name: data
              mountPath: /home/node/.openclaw
            - name: tmp
              mountPath: /tmp
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: openclaw-config
        - name: soul
          configMap:
            name: openclaw-soul
        - name: data
          persistentVolumeClaim:
            claimName: openclaw-data
        - name: tmp
          emptyDir:
            sizeLimit: 100Mi
