apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: {{ .Values.namespace }}
  labels:
    app: openclaw
    tier: app
    team: platform
    env: {{ .Values.env }}
spec:
  replicas: {{ .Values.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
        tier: app
        team: platform
        env: {{ .Values.env }}
    spec:
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: harbor-pull-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: setup-config
          image: busybox
          command: ["sh", "-c"]
          args:
            - |
              cp /config/openclaw.json /home/node/.openclaw/openclaw.json
              mkdir -p /home/node/.openclaw/workspace
              mkdir -p /home/node/.openclaw/agents/default/agent
              cat > /home/node/.openclaw/agents/default/agent/models.json <<'MODELS'
              {"providers":{"ollama":{"baseUrl":"http://10.0.1.120:11434","auth":"api-key","api":"ollama","models":[{"id":"qwen3.5:27b","name":"Qwen 3.5 27B","api":"ollama","reasoning":false,"input":["text"],"contextWindow":32768,"maxTokens":8192}]}}}
              MODELS
              echo "Config and models written"
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: data
              mountPath: /home/node/.openclaw
      containers:
        - name: openclaw
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.gateway.port }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-gateway
                  key: token
            - name: NODE_ENV
              value: production
          volumeMounts:
            - name: soul
              mountPath: /etc/openclaw/SOUL.md
              subPath: SOUL.md
              readOnly: true
            - name: data
              mountPath: /home/node/.openclaw
            - name: tmp
              mountPath: /tmp
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.gateway.port }}
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ .Values.gateway.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: openclaw-config
        - name: soul
          configMap:
            name: openclaw-soul
        - name: data
          persistentVolumeClaim:
            claimName: openclaw-data
        - name: tmp
          emptyDir:
            sizeLimit: 100Mi
