apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openclaw-gateway
  namespace: {{ .Values.namespace }}
  labels:
    app: openclaw
    team: platform
    env: {{ .Values.env }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: openclaw-gateway
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: {{ .Values.namespace }}/gateway
        property: token
    - secretKey: password
      remoteRef:
        key: {{ .Values.namespace }}/gateway
        property: password
