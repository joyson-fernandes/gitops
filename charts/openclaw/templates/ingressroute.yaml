apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: openclaw-joysontech-com
  namespace: {{ .Values.namespace }}
spec:
  secretName: openclaw-joysontech-com-tls
  issuerRef:
    name: local-ca-issuer
    kind: ClusterIssuer
  dnsNames:
    - openclaw.joysontech.com
  duration: 8760h
  renewBefore: 720h
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: openclaw
  namespace: {{ .Values.namespace }}
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`openclaw.joysontech.com`)
      middlewares:
        - name: local-only
          namespace: traefik
      services:
        - name: openclaw
          port: {{ .Values.gateway.port }}
  tls:
    secretName: openclaw-joysontech-com-tls
