# Allow ingress only from Traefik namespace
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: openclaw-ingress
  namespace: {{ .Values.namespace }}
spec:
  endpointSelector:
    matchLabels:
      app: openclaw
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: traefik
      toPorts:
        - ports:
            - port: {{ .Values.gateway.port | quote }}
              protocol: TCP
---
# Egress: DNS + Ollama + messaging platforms only
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: openclaw-egress
  namespace: {{ .Values.namespace }}
spec:
  endpointSelector:
    matchLabels:
      app: openclaw
  egress:
    # DNS resolution (kube-dns)
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # Ollama LLM on Mac Studio
    - toCIDR:
        - {{ .Values.egress.ollama.ip }}/32
      toPorts:
        - ports:
            - port: {{ .Values.egress.ollama.port | quote }}
              protocol: TCP
    # Messaging platforms (Discord, Telegram)
    - toFQDNs:
        {{- range .Values.egress.messaging }}
        - matchName: {{ . | quote }}
        {{- end }}
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
# Namespace default deny — catches any rogue pods
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: openclaw-namespace-default-deny
  namespace: {{ .Values.namespace }}
spec:
  endpointSelector: {}
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
