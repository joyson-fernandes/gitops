apiVersion: v1
kind: Service
metadata:
  name: openclaw
  namespace: {{ .Values.namespace }}
  labels:
    app: openclaw
    team: platform
    env: {{ .Values.env }}
spec:
  type: ClusterIP
  selector:
    app: openclaw
  ports:
    - port: {{ .Values.gateway.port }}
      targetPort: {{ .Values.gateway.port }}
      protocol: TCP
      name: gateway
