namespace: openclaw
env: production

image:
  repository: registry.joysontech.com/library/openclaw
  tag: "v2026.3.7"
  pullPolicy: Always

replicas: 1

gateway:
  port: 18789
  bindAddress: "0.0.0.0"

llm:
  provider: ollama
  baseUrl: "http://10.0.1.120:11434"
  model: "gemma4:26b"
  modelName: "Gemma 4 26B"
  contextWindow: 32768
  maxTokens: 8192
  # OpenClaw default is 120s; bump to 300s so cold-load + long prompt-eval
  # on local 26B models doesn't trip the idle watchdog -> retry -> orphan.
  idleTimeoutSeconds: 300

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 2Gi

persistence:
  # Moved off ceph-block due to slow OSDs (HEALTH_WARN, 10s+ write stalls).
  # local-path keeps chat state snappy; pod is pinned to a single node.
  storageClass: local-path
  size: 5Gi

egress:
  ollama:
    ip: "10.0.1.120"
    port: "11434"
  messaging:
    - "discord.com"
    - "gateway.discord.gg"
    - "api.telegram.org"
