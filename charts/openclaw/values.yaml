namespace: openclaw
env: production

image:
  repository: registry.joysontech.com/library/openclaw
  tag: "v2026.3.7"
  pullPolicy: Always

replicas: 1

gateway:
  port: 18789
  bindAddress: "0.0.0.0"
  # Traefik pods run in the k8s pod CIDR — trust them to set X-Forwarded-For.
  # OpenClaw historically only accepted exact IPs; testing CIDR on v2026.3.7.
  trustedProxies:
    - "10.244.0.0/16"

llm:
  provider: ollama
  baseUrl: "http://10.0.1.120:11434"
  model: "gemma4:26b"
  modelName: "Gemma 4 26B"
  contextWindow: 32768
  maxTokens: 8192

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 2Gi

persistence:
  storageClass: ceph-block
  size: 5Gi

egress:
  ollama:
    ip: "10.0.1.120"
    port: "11434"
  messaging:
    - "discord.com"
    - "gateway.discord.gg"
    - "api.telegram.org"
