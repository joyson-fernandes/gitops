apiVersion: apps/v1
kind: Deployment
metadata:
  name: openmemory-api
  namespace: {{ .Values.namespace }}
  labels:
    app: openmemory
    tier: app
    team: platform
    env: {{ .Values.env }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: {{ .Values.replicas.api }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: openmemory
      tier: app
      component: api
  template:
    metadata:
      labels:
        app: openmemory
        tier: app
        team: platform
        env: {{ .Values.env }}
        component: api
    spec:
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: harbor-pull-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: "{{ .Values.image.api.repository }}:{{ .Values.image.api.tag }}"
          imagePullPolicy: {{ .Values.image.api.pullPolicy }}
          # Single worker is mandatory: mem0's MCP SSE transport keeps session
          # state in-process, so with --workers > 1 the SSE connection lands on
          # one worker and the subsequent /mcp/messages POST may hit the other,
          # breaking every tool call. Tradeoff: a slow LLM call will block all
          # other requests; mitigated by the long keep-alive.
          command: ["uvicorn"]
          args:
            - "main:app"
            - "--host=0.0.0.0"
            - "--port=8765"
            - "--workers=1"
            - "--timeout-keep-alive=120"
          ports:
            - name: http
              containerPort: 8765
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          envFrom:
            - configMapRef:
                name: openmemory-env
            - secretRef:
                name: openmemory-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: openmemory-db
                  key: DATABASE_URL
            # Upstream config.json references env:API_KEY for OpenAI — alias
            # OPENAI_API_KEY from the config Secret so the JSON still resolves
            # even when we're using Ollama (value is empty, never read).
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: openmemory-config
                  key: OPENAI_API_KEY
            # mem0 SDK calls os.makedirs(os.path.expanduser("~/.mem0")) on
            # import. Point HOME at /tmp (emptyDir, writable) so the rootfs
            # can stay read-only.
            - name: HOME
              value: /tmp
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            {{- toYaml .Values.resources.api | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /docs
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 12
          # No livenessProbe — mem0's sync LLM calls can block the event loop
          # for long enough that liveness would restart the pod mid-request.
          # Rely on readiness + the gateway's own timeout semantics instead.
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 100Mi
