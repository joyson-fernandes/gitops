apiVersion: apps/v1
kind: Deployment
metadata:
  name: openmemory-api
  namespace: {{ .Values.namespace }}
  labels:
    app: openmemory
    tier: app
    team: platform
    env: {{ .Values.env }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: {{ .Values.replicas.api }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: openmemory
      tier: app
      component: api
  template:
    metadata:
      labels:
        app: openmemory
        tier: app
        team: platform
        env: {{ .Values.env }}
        component: api
    spec:
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: harbor-pull-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: "{{ .Values.image.api.repository }}:{{ .Values.image.api.tag }}"
          imagePullPolicy: {{ .Values.image.api.pullPolicy }}
          ports:
            - name: http
              containerPort: 8765
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          envFrom:
            - configMapRef:
                name: openmemory-env
            - secretRef:
                name: openmemory-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: openmemory-db
                  key: DATABASE_URL
            # Upstream config.json references env:API_KEY for OpenAI — alias
            # OPENAI_API_KEY from the config Secret so the JSON still resolves
            # even when we're using Ollama (value is empty, never read).
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: openmemory-config
                  key: OPENAI_API_KEY
            # mem0 SDK calls os.makedirs(os.path.expanduser("~/.mem0")) on
            # import. Point HOME at /tmp (emptyDir, writable) so the rootfs
            # can stay read-only.
            - name: HOME
              value: /tmp
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            {{- toYaml .Values.resources.api | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /docs
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /docs
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 100Mi
