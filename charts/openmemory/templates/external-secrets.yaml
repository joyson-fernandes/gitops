apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openmemory-db
  namespace: {{ .Values.namespace }}
  labels:
    app: openmemory
    team: platform
    env: {{ .Values.env }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: openmemory-db
    creationPolicy: Owner
    template:
      data:
        app_password: "{{ `{{ .app_password }}` }}"
        superuser_password: "{{ `{{ .superuser_password }}` }}"
        # Fully-formed runtime DSN — used by the API container directly
        DATABASE_URL: "postgresql://{{ .Values.db.user }}:{{ `{{ .app_password }}` }}@{{ .Values.db.host }}:{{ .Values.db.port }}/{{ .Values.db.name }}"
  data:
    - secretKey: app_password
      remoteRef:
        key: {{ .Values.namespace }}/db
        property: app_password
    - secretKey: superuser_password
      remoteRef:
        key: {{ .Values.namespace }}/db
        property: superuser_password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openmemory-config
  namespace: {{ .Values.namespace }}
  labels:
    app: openmemory
    team: platform
    env: {{ .Values.env }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: openmemory-config
    creationPolicy: Owner
  data:
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: {{ .Values.namespace }}/config
        property: openai_api_key
