apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: openmemory-api-joysontech-com
  namespace: {{ .Values.namespace }}
spec:
  secretName: openmemory-api-joysontech-com-tls
  issuerRef:
    name: local-ca-issuer
    kind: ClusterIssuer
  dnsNames:
    - {{ .Values.ingress.apiHost }}
  duration: 8760h
  renewBefore: 720h
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: openmemory-api
  namespace: {{ .Values.namespace }}
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`{{ .Values.ingress.apiHost }}`)
      middlewares:
        - name: local-only
          namespace: traefik
      services:
        - name: openmemory-api
          port: 8765
  tls:
    secretName: openmemory-api-joysontech-com-tls
