apiVersion: v1
kind: Service
metadata:
  name: openmemory-api
  namespace: {{ .Values.namespace }}
  labels:
    app: openmemory
    tier: app
    team: platform
    env: {{ .Values.env }}
    component: api
spec:
  type: ClusterIP
  selector:
    app: openmemory
    tier: app
    component: api
  ports:
    - name: http
      port: 8765
      targetPort: http
      protocol: TCP
