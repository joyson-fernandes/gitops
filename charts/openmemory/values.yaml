namespace: openmemory
env: production

# External user identifier — appears in the MCP SSE URL path
# Final URL: https://openmemory-api.joysontech.com/mcp/<client>/sse/<userId>
userId: joyson

image:
  api:
    repository: registry.joysontech.com/library/openmemory-api
    # Upstream commit cfb5f17 + our two patches:
    #   pg1 — Postgres connect_args (SQLite-specific check_same_thread broke PG)
    #   pg2 — skip hardcoded-OpenAI categorization when OPENAI_API_KEY unset
    # See charts/openmemory/README.md for the rebuild recipe.
    tag: "cfb5f17-pg2"
    pullPolicy: Always
  ui:
    repository: registry.joysontech.com/library/openmemory-ui
    tag: "cfb5f17"
    pullPolicy: Always
  qdrant:
    repository: qdrant/qdrant
    tag: "v1.14.0"
    pullPolicy: IfNotPresent
  mcpo:
    repository: ghcr.io/open-webui/mcpo
    tag: "main"
    pullPolicy: Always

replicas:
  api: 1
  ui: 1
  mcpo: 1

# mcpo (Open WebUI's MCP→OpenAPI proxy). Exposes the same MCP tools as a
# regular OpenAPI tool server so Open WebUI can consume them (OWUI doesn't
# speak MCP natively). Auth via an API key stored in Vault secret/openmemory/mcpo.
mcpo:
  port: 8000
  clientName: openwebui    # becomes the <client> segment in the SSE URL

# LLM + embedder — all local via Ollama on Mac Studio.
# NOTE: OpenMemory's mem0 config lives in the Postgres `configs` table, NOT in
# env vars — the default fallback in upstream code is hardcoded to OpenAI. The
# llm-seed-job template (PostSync hook) idempotently PUTs these values to
# /api/v1/config/mem0/{llm,embedder} on every sync so the DB row matches the
# chart.
llm:
  provider: ollama
  ollamaUrl: "http://10.0.1.120:11434"
  chatModel: "qwen2.5:14b-instruct"   # chosen for non-thinking, JSON-strict extraction; ~20s warm
  embedModel: "nomic-embed-text"       # 768 dims; matches the Qdrant collection
  ollamaCidr: "10.0.1.120/32"
  ollamaPort: "11434"

# Shared CNPG prod-db in linkvolt namespace
db:
  host: "prod-db-rw.linkvolt.svc.cluster.local"
  port: 5432
  name: openmemory
  user: openmemory
  superuserName: postgres

qdrant:
  storageClass: ceph-block
  size: 10Gi

ingress:
  uiHost: openmemory.joysontech.com
  apiHost: openmemory-api.joysontech.com

resources:
  api:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  ui:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  qdrant:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "2"
      memory: 2Gi
  bootstrap:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  mcpo:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
