apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: status-joysontech-com
  namespace: {{ .Values.namespace }}
spec:
  secretName: status-joysontech-com-tls
  issuerRef:
    name: local-ca-issuer
    kind: ClusterIssuer
  dnsNames:
    - status.joysontech.com
  duration: 8760h
  renewBefore: 720h
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: uptime-kuma
  namespace: {{ .Values.namespace }}
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`status.joysontech.com`)
      middlewares:
        - name: local-only
          namespace: traefik
      services:
        - name: uptime-kuma
          port: {{ .Values.port }}
  tls:
    secretName: status-joysontech-com-tls
